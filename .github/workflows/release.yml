# Builds and uploads release binaries when a version tag is pushed.
#
# Runs on the GitHub mirror only (SourceHut is canonical); pushing a
# v* tag to GitHub triggers it. Linux binaries are musl-linked and
# fully static; the macOS binary is a universal (x86_64 + aarch64)
# build. Each asset is a .tar.gz containing the binary, LICENSE,
# README and the manpage, with a .sha256 checksum alongside.

name: Release

permissions:
  contents: read

on:
  push:
    tags:
      - v[0-9]+.*

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: taiki-e/create-gh-release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  upload-assets:
    needs: create-release
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          - target: universal-apple-darwin
            os: macos-latest
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: peak-mem
          target: ${{ matrix.target }}
          include: LICENSE,README,man/man1/peak-mem.1
          leading-dir: true
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}
